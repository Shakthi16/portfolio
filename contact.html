<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
    <script type="text/javascript">
        // Initialize EmailJS with your user ID
        (function() {
            emailjs.init("YOUR_USER_ID");  // Replace with your actual EmailJS user ID
        })();

        // Send the email when form is submitted
        function sendEmail(event) {
            event.preventDefault();  // Prevent default form submission

            // Set your EmailJS service and template IDs
            const serviceID = 'YOUR_SERVICE_ID';  // Replace with your actual EmailJS service ID
            const templateID = 'YOUR_TEMPLATE_ID';  // Replace with your actual EmailJS template ID

            const templateParams = {
                name: event.target.name.value,
                email: event.target.email.value,
                message: event.target.message.value,
                interest: event.target.interest.value,
                to_email: 'srishakthi799@gmail.com'  // The email address to send the message to
            };

            // Send the email using EmailJS
            emailjs.send(serviceID, templateID, templateParams)
                .then(function(response) {
                    console.log('Success:', response);
                    alert('Message sent successfully!');
                })
                .catch(function(error) {
                    console.error('Error:', error);
                    alert('Failed to send message. Please try again later.');
                });
        }
    </script>
</head>
<body class="bg-purple-900 text-white flex items-center justify-center min-h-screen">
    <div class="container mx-auto p-8 flex flex-col md:flex-row items-center justify-center">
        <div class="md:w-1/2 mb-8 md:mb-0">
            <h1 class="text-4xl font-semibold mb-4">Reach out to a passionate <span class="text-pink-500">full-stack developer</span> in the making!</h1>
            <div class="mb-4 flex items-center">
                <i class="fas fa-envelope text-pink-500 mr-2"></i>
                <span>srishakthi799@gmail.com</span>
            </div>
            <div class="mb-4 flex items-center">
                <i class="fas fa-phone text-pink-500 mr-2"></i>
                <span class="border border-pink-500 p-2 rounded-md">8838198861</span>
            </div>
            <div class="mb-4 flex items-center">
                <i class="fas fa-map-marker-alt text-pink-500 mr-2"></i>
                <span>Vellore, India</span>
            </div>
            <div class="flex space-x-4 mt-8">
                <a href="#" class="text-pink-500"><i class="fab fa-linkedin"></i></a>
                <a href="#" class="text-pink-500"><i class="fab fa-github"></i></a>
                <a href="#" class="text-pink-500"><i class="fas fa-globe"></i></a>
            </div>
        </div>
        <div class="md:w-1/2 bg-white text-gray-800 p-8 rounded-lg shadow-lg">
            <h2 class="text-lg font-semibold mb-4">I'm interested in...</h2>
            <form onsubmit="sendEmail(event)">
                <div class="mb-4">
                    <label for="interest" class="block text-sm font-medium text-gray-700">Select your interest</label>
                    <select id="interest" name="interest" class="mt-1 block w-full border-b-2 border-pink-500 focus:outline-none focus:border-pink-500" required>
                        <option value="Web Development">Web Development</option>
                        <option value="Full-Stack Projects">Full-Stack Projects</option>
                        <option value="Backend Development">Backend Development</option>
                        <option value="Frontend Development">Frontend Development</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label for="name" class="block text-sm font-medium text-gray-700">Your name</label>
                    <input type="text" id="name" name="name" class="mt-1 block w-full border-b-2 border-pink-500 focus:outline-none focus:border-pink-500" required>
                </div>
                <div class="mb-4">
                    <label for="email" class="block text-sm font-medium text-gray-700">Your email</label>
                    <input type="email" id="email" name="email" class="mt-1 block w-full border-b-2 border-gray-300 focus:outline-none focus:border-pink-500" required>
                </div>
                <div class="mb-4">
                    <label for="message" class="block text-sm font-medium text-gray-700">Your message</label>
                    <textarea id="message" name="message" rows="4" class="mt-1 block w-full border-b-2 border-gray-300 focus:outline-none focus:border-pink-500" required></textarea>
                </div>
                <button type="submit" class="bg-pink-500 text-white px-6 py-2 rounded-md flex items-center hover:bg-pink-600">
                    <i class="fas fa-paper-plane mr-2"></i> Send Message
                </button>
            </form>
        </div>
    </div>
</body>
</html>
