<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            transition: background 0.3s, color 0.3s;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
        }
        .dark-mode {
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            color: #d4af37;
        }
        .transition-button {
            transition: background-color 0.3s, color 0.3s;
        }
        .active-button {
            background-color: #ff007f;
            color: white;
        }
        iframe.dark-mode-iframe {
            filter: invert(1) hue-rotate(180deg); /* Dark mode effect for iframe */
        }
    </style>
</head>
<body class="p-4 sm:p-8">
    <div class="flex justify-end mb-4">
        <button id="theme-toggle" class="bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gold px-4 py-2 rounded-full font-medium" onclick="toggleDarkMode()">
            <i id="theme-icon" class="fas fa-moon"></i>
        </button>
    </div>
    <div class="w-full h-screen mx-auto bg-white dark:bg-black rounded-lg shadow-lg overflow-hidden">
        <div class="flex flex-col sm:flex-row h-full">
            <div class="w-full sm:w-1/4 bg-white dark:bg-black p-4 sm:p-6">
                <div class="text-center">
                    <img src="https://i.ibb.co/XsSPqF2/Screenshot-2024-11-03-182856-removebg-preview.png" alt="Profile Image" class="w-32 h-32 rounded-full mx-auto"/>
                    <h2 class="mt-4 text-xl font-semibold dark:text-gold">Shakthi Sri</h2>
                    <p class="text-gray-600 dark:text-gold">Full Stack Developer</p>
                    <div class="mt-4 flex justify-center space-x-3">
                        <a class="text-blue-500" href="#"><i class="fab fa-facebook-f"></i></a>
                        <a class="text-blue-400" href="#"><i class="fab fa-twitter"></i></a>
                        <a class="text-pink-500" href="#"><i class="fab fa-dribbble"></i></a>
                        <a class="text-blue-700" href="#"><i class="fab fa-linkedin-in"></i></a>
                    </div>
                </div>
                <div class="mt-6 space-y-4">
                    <div class="flex items-center bg-gray-100 dark:bg-gray-700 p-3 rounded-lg">
                        <i class="fas fa-phone-alt text-pink-500"></i>
                        <div class="ml-3">
                            <p class="text-gray-600 dark:text-gold">Phone</p>
                            <p class="font-medium dark:text-gold">8838198986</p>
                        </div>
                    </div>
                    <div class="flex items-center bg-gray-100 dark:bg-gray-700 p-3 rounded-lg">
                        <i class="fas fa-envelope text-pink-500"></i>
                        <div class="ml-3">
                            <p class="text-gray-600 dark:text-gold">Email</p>
                            <p class="font-medium dark:text-gold">srishakthi799@mail.com</p>
                        </div>
                    </div>
                    <div class="flex items-center bg-gray-100 dark:bg-gray-700 p-3 rounded-lg">
                        <i class="fas fa-map-marker-alt text-pink-500"></i>
                        <div class="ml-3">
                            <p class="text-gray-600 dark:text-gold">Location</p>
                            <p class="font-medium dark:text-gold">Vellore, India</p>
                        </div>
                    </div>
                    <div class="flex items-center bg-gray-100 dark:bg-gray-700 p-3 rounded-lg">
                        <i class="fab fa-github text-pink-500"></i>
                        <div class="ml-3">
                            <p class="text-gray-600 dark:text-gold">GitHub</p>
                            <p class="font-medium dark:text-gold"><a href="https://github.com/Shakthi16" target="_blank">Shakthi16</a></p>
                        </div>
                    </div>
                </div>
                  
                <div class="text-center mt-6">
                    <a class="bg-pink-500 text-white px-4 py-2 rounded-full font-medium" href="#">Download CV</a>
                </div>
            </div>
            <div class="w-full sm:w-3/4 bg-gray-50 dark:bg-gray-800 p-4 sm:p-6 h-full">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex space-x-4">
                        <a id="about-button" class="bg-pink-500 text-white px-4 py-2 rounded-full font-medium transition-button" href="#" onclick="loadContent('about.html', 'about-button')">About</a>
                        <a id="skills-button" class="bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gold px-4 py-2 rounded-full font-medium transition-button" href="#" onclick="loadContent('skills.html', 'skills-button')">Resume</a>
                        <a id="projects-button" class="bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gold px-4 py-2 rounded-full font-medium transition-button" href="#" onclick="loadContent('projects.html', 'projects-button')">Projects</a>
                        <a id="chat-button" class="bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gold px-4 py-2 rounded-full font-medium transition-button" href="#" onclick="loadContent('chat.html', 'chat-button')">Chat with Me</a>
                        <a id="contact-button" class="bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gold px-4 py-2 rounded-full font-medium transition-button" href="#" onclick="loadContent('contact.html', 'contact-button')">Contact</a>
                    </div>
                </div>
                <!-- Initially load load.html -->
                <iframe id="content" class="h-full w-full" style="border: none;" src="load.html"></iframe>
            </div>
        </div>
    </div>
    <script>
        function loadContent(page, buttonId) {
            document.getElementById('content').src = page;
            setActiveButton(buttonId);
        }

        function setActiveButton(buttonId) {
            const buttons = document.querySelectorAll('.transition-button');
            buttons.forEach(button => {
                button.classList.remove('active-button', 'bg-pink-500', 'text-white');
                button.classList.add('bg-gray-200', 'dark:bg-gray-700', 'text-gray-600', 'dark:text-gold');
            });

            const activeButton = document.getElementById(buttonId);
            activeButton.classList.add('active-button', 'bg-pink-500', 'text-white');
            activeButton.classList.remove('bg-gray-200', 'dark:bg-gray-700', 'text-gray-600', 'dark:text-gold');
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            document.getElementById('content').classList.toggle('dark-mode-iframe');

            const themeIcon = document.getElementById("theme-icon");
            themeIcon.classList.toggle('fa-moon');
            themeIcon.classList.toggle('fa-sun');

            // Save preference in local storage
            const darkModeEnabled = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', darkModeEnabled ? 'enabled' : 'disabled');
        }

        // Load preference on page load
        window.onload = function () {
            const darkModePreference = localStorage.getItem('darkMode');
            if (darkModePreference === 'enabled') {
                document.body.classList.add('dark-mode');
                document.getElementById('content').classList.add('dark-mode-iframe');
                document.getElementById("theme-icon").classList.add('fa-sun');
                document.getElementById("theme-icon").classList.remove('fa-moon');
            }
        }
    </script>
</body>
</html>
